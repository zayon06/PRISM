# =============================================================================
# PRISM — Production Docker Compose
# =============================================================================
# Prerequisites:
#   1. Copy .env.example to .env and fill in all required values.
#   2. Ensure DNS for ${DOMAIN} points to this host.
#   3. Run:  docker compose up -d --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Reverse Proxy / Edge Router
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.6
    command:
      # Provider ----------------------------------------------------------
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      # Entrypoints -------------------------------------------------------
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP → HTTPS redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # TLS / Let's Encrypt -----------------------------------------------
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Health / Observability --------------------------------------------
      - "--ping=true"
      - "--log.level=WARN"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Next.js Client
  # ---------------------------------------------------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: prism-client-container
    container_name: prism-client-container
    environment:
      NODE_ENV: production
      PORT: "3000"
    expose:
      - "3000"
    networks:
      - proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://localhost:3000/',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.client.entrypoints=websecure"
      - "traefik.http.routers.client.tls.certresolver=letsencrypt"
      - "traefik.http.services.client.loadbalancer.server.port=3000"

  # ---------------------------------------------------------------------------
  # Auth Service (FastAPI)
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    image: prism-auth-service-container
    container_name: prism-auth-service-container
    environment:
      DB_HOSTNAME: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-prism}
      DB_USERNAME: ${DB_USERNAME:-prism}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER:-postgresql+asyncpg}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      BACKEND_URL: ${BACKEND_URL:-}
    expose:
      - "8000"
    networks:
      - proxy
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      # Router — API routes
      - "traefik.http.routers.auth-service.rule=Host(`${DOMAIN}`) && PathPrefix(`/api/auth`)"
      - "traefik.http.routers.auth-service.entrypoints=websecure"
      - "traefik.http.routers.auth-service.tls.certresolver=letsencrypt"
      - "traefik.http.services.auth-service.loadbalancer.server.port=8000"
      # ForwardAuth middleware (consumed by other services via: traefik.http.routers.<name>.middlewares=auth-forward)
      - "traefik.http.middlewares.auth-forward.forwardauth.address=http://auth-service:8000/verify"
      - "traefik.http.middlewares.auth-forward.forwardauth.authResponseHeaders=X-User-ID,X-User-Role"

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: prism-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-prism}
      POSTGRES_USER: ${DB_USERNAME:-prism}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prism} -d ${POSTGRES_DB:-prism}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# =============================================================================
# Networks
# =============================================================================
networks:
  proxy:
    driver: bridge
  backend:
    driver: bridge
    internal: true   # no external access — only inter-service

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  letsencrypt:
